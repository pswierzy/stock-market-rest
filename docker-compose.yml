services:
  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - stock-market-app

  stock-market-app:
    build: ./stock-market
    deploy:
      replicas: 3
    restart: unless-stopped
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=password
      - DB_NAME=stock_market
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 2s
      retries: 10
      start_period: 10s
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock_market
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
